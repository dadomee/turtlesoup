<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@ 추리비서 AI</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/theme.js"></script>
</head>
<body class="mode-ai">
  <div class="app">
    <nav class="rail" aria-label="앱">
      <div class="rail-item active"><span class="ic">💬</span>채팅</div>
      <div class="rail-item"><span class="ic">👥</span>팀</div>
      <div class="rail-item"><span class="ic">📅</span>일정</div>
      <div class="rail-item"><span class="ic">📁</span>파일</div>
    </nav>

    <aside class="sidebar">
      <div class="ws-header">(주)성실상사</div>
      <div class="nav">
        <span class="nav-label">워크스페이스</span>
        <a class="nav-item" href="/"># 홈</a>
        <a class="nav-item" href="/classic.html"># 문제-보관함</a>
        <a class="nav-item active" href="/ai.html">@ 추리비서 AI</a>
        <a class="nav-item" href="/room.html"># 팀-라운지</a>
      </div>
      <div class="sidebar-foot"><span class="status-dot"></span> <span data-me-name>게스트</span> · 근무중</div>
    </aside>

    <div class="main">
      <header class="topbar">
        <span class="topbar-title">@ 추리비서 AI</span>
        <span class="topbar-search">메시지, 파일, 사람 검색</span>
        <span class="topbar-spacer"></span>
        <span class="avatar" data-me-avatar>?</span>
      </header>

      <div class="content">
        <div class="content-narrow">

          <div id="list-view">
            <div class="mode-hero">
              <span class="mh-icon">🤖</span>
              <div>
                <div class="mh-title">추리비서 AI</div>
                <div class="mh-desc">자유롭게 질문하면 예·아니오로 답하는 봇과 대화하며 추리하세요.</div>
              </div>
            </div>
            <div id="puzzle-list"></div>
          </div>

          <div id="play-view" class="hidden">
            <p><button class="ghost" onclick="showList()">← 문제 목록</button></p>
            <div class="card">
              <h2 id="play-title"></h2>
              <p class="muted" id="play-meta"></p>
              <p id="play-scenario" style="line-height:1.7;"></p>
            </div>

            <div class="card">
              <div id="chat-log" class="chat-log"></div>
              <div class="composer">
                <input type="text" id="question-input" placeholder="추리비서 AI에게 메시지 보내기">
                <button id="ask-btn">전송</button>
              </div>
              <p class="muted" style="margin-top:8px; display:flex; align-items:center; gap:12px;">질문 수: <span id="q-count">0</span>
                <button id="hint-btn" class="ghost" style="padding:5px 12px;">💡 힌트 (<span id="hint-n">0</span>/3)</button>
              </p>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="/js/nickname.js"></script>
  <script src="/js/workspace.js"></script>
  <script src="/js/shell.js"></script>
  <script src="/js/boss.js"></script>
  <script src="/js/ai.js"></script>
</body>
</html>
